# The dataset presets offered by the sidebar selector.
#
# Membership per function is computed in decbench/scoring/datasets.py
# (`assign_datasets`) against the `name` field; this file owns only the
# *presentation* (label + one-line description) and which preset the report opens
# with.
#
# `default = true` marks the preset selected on load. EXACTLY ONE preset must set
# it (tests/test_content.py enforces this). It is explicit on purpose: the default
# used to be positional (the first preset in the list), so reordering this file
# silently changed which dataset the report opened with.
#
# Button order is the order of the tables below.

[[preset]]
name = "unoptimized"
label = "unoptimized"
description = "unoptimized builds (O0) — surfaces simple structural differences"
default = true

[[preset]]
name = "optimized"
label = "optimized"
description = "optimized without inlining (O2-noinline)"

[[preset]]
name = "inlined"
label = "inlined"
description = "optimized WITH inlining (plain O2)"

[[preset]]
name = "large"
label = "large"
description = "large functions only (upper size tail), optimized without inlining"

[[preset]]
name = "sample-set"
label = "sample-set"
description = "~250 functions evenly sampled across unoptimized/optimized/inlined/large/ARM-unoptimized and projects"
