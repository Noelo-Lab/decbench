# DecBench Project Configuration: GNU Coreutils
# This is a sample project from the SAILR evaluation set

name = "coreutils"
version = "9.1"

# Source configuration - use release tarball (includes pre-generated ./configure)
source_remote = "https://ftp.gnu.org/gnu/coreutils/coreutils-9.1.tar.xz"
remote_type = "tar"

# Build directories
package_dir = "coreutils"
source_dir = "src"

# Build commands (no bootstrap needed with release tarball)
post_download_cmds = []
pre_make_cmds = ["./configure --quiet --disable-gcc-warnings"]
make_cmd = "make"

[compilation]
# Optimization levels to compile
optimization_levels = ["O0", "O2"]

# Base compiler flags
base_flags = ["-g", "-fno-inline", "-fno-builtin", "-save-temps=obj"]

# Compiler to use
c_compiler = "gcc"
