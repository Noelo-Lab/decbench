# DecBench Project Configuration: GNU Coreutils
# GNU coreutils — the core CLI file/text/shell utilities for Unix-like systems.
# From the SAILR evaluation set. Labels: sailr (origin), cli-tool + system (the
# package is a suite of command-line system utilities).

name = "coreutils"
version = "9.1"

# Source configuration - use release tarball (ships a pre-generated ./configure,
# so no bootstrap/gnulib fetch needed). Known-good URL; avoids the gnulib patch.
source_remote = "https://mirrors.kernel.org/gnu/coreutils/coreutils-9.1.tar.xz"
remote_type = "tar"

# Build directories
package_dir = "coreutils"
source_dir = "src"

# Build commands (no bootstrap needed with release tarball)
post_download_cmds = []
pre_make_cmds = ["./configure --quiet --disable-gcc-warnings"]
make_cmd = "make"
post_make_cmds = []

labels = ["sailr", "cli-tool", "system"]

[compilation]
# Optimization levels to compile
optimization_levels = ["O0", "O2", "O2-noinline"]

# Base compiler flags (no -fno-inline here; the O2-noinline level adds it)
base_flags = ["-g", "-fno-builtin", "-save-temps=obj"]

# Compiler to use
c_compiler = "gcc"
